<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs</title>
  <link rel="stylesheet" href="blogstyle.css"> <!-- 添加链接到外部 CSS 文件 -->
  <link rel="icon" type="image/png" href="ico.png">
<head>

		<!--背景渐变效果样式代码开始（可忽略）-->
		<style type="text/css">
			html,body{width:100%;height:100%;margin:0;padding:0;}
			body{
			background: -webkit-linear-gradient(left,rgba(89,114,192,0.8),rgba(89,114,192,0.6));
			background: -o-linear-gradient(right,rgba(89,114,192,0.8),rgba(89,114,192,0.6));
			background: -moz-linear-gradient(right,rgba(89,114,192,0.8),rgba(89,114,192,0.6));
			background: linear-gradient(to right, rgba(89,114,192,0.8), rgba(89,114,192,0.6));
			background-size: 400% 400%;
			animation: gradientBG 5s ease infinite;}
			@keyframes gradientBG {
			0% {
			background-position: 0% 50%;
			}
			50% {
			background-position: 100% 50%;
			}
			100% {
			background-position: 0% 50%;
			}
			}
		</style>
		<!--背景渐变效果样式代码结束（可忽略）-->

		<!--定义底部承载游动小鱼特效的div样式开始-->
		<style type="text/css">
			.container{
			margin:0;
			padding:0;
			background-color:transparent;
			width:100%;
			height:200px;
			z-index:-1;
			position:fixed;
			bottom:0;
			left:0;}
		</style>
		<!--定义底部承载游动小鱼特效的div样式结束-->

	</head>
	<body>
        <nav>
            <ul>

                <li><a href="index.html">Home</a></li>
                <li>
                    <form id="search-form">
                        <input type="text" id="search-input" placeholder="Search blog...">
                        <button type="submit">Search</button>
                    </form>
                </li>
                <li><a href="https://github.com/gcmarks/">Github</a></li>

            </ul>

        </nav>
        
        <section id="blog-list">
            <h1>Blog Posts</h1>
            <ul id="posts-list">
                <!-- Blog posts will be dynamically added here -->
            </ul>
        </section>
        
        <script>
        fetch('./blog/posts.json')
            .then(response => response.json())
            .then(data => {
                const blogList = document.getElementById('posts-list');

                // 遍历每个分类
                for (const category in data) {
                    if (data.hasOwnProperty(category)) {
                        const categoryPosts = data[category];

                        // 按日期由近到远排序
                        categoryPosts.sort((a, b) => new Date(b.date) - new Date(a.date)) ;

                        categoryPosts.forEach(post => {
                            const listItem = document.createElement('li');
                            listItem.classList.add('post');
                            listItem.innerHTML = `
                                <a href="blog/${post.slug}.html">${post.title}</a>
                                <span class="post-date">${post.date}</span>
                                <span class="post-category">#${category}</span>
                            `;
                            blogList.appendChild(listItem);
                        });
                    }
                }
            })
            .catch(error => {
                console.error('Error fetching blog posts:', error);
            });
        </script>

        <script>
            document.getElementById('search-form').addEventListener('submit', function (event) {
            event.preventDefault(); // 阻止表单默认提交行为

            const searchInput = document.getElementById('search-input').value.toLowerCase();
            const postsList = document.getElementById('posts-list');

            // 遍历博客列表，根据搜索关键字过滤显示博客
            Array.from(postsList.children).forEach(post => {
                const title = post.querySelector('a').textContent.toLowerCase();
                if (title.includes(searchInput)) {
                    post.style.display = 'block';
                } else {
                    post.style.display = 'none';
                }
            });
        });

        </script>


		<!--引入jquery-->
		<script src="jquery.min.js"></script>

		<!--承载游动小鱼特效的div容器-->
		<div id="jsi-flying-fish-container" class="container"></div>

		<!--核心特效定义js-->
		<script src='fish.js'></script>

	</body>
</html>
